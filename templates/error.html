<!DOCTYPE html>
<html>
<head>
    <title>Error - Crop Recommendation</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-image: url("/static/farming_background.jpg");
            background-size: cover;
            background-position: center;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .error-box {
            background: rgba(0, 0, 0, 0.75);
            padding: 40px;
            border-radius: 15px;
            width: 450px;
            text-align: center;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }

        h2 {
            color: #ff4c4c;
            font-size: 26px;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        a {
            text-decoration: none;
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
        }

        a:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="error-box">
        <h2>❌ Something Went Wrong</h2>
        <p>{{ message }}</p>
        <a href="{{ url_for('home') }}">🔁 Try Again</a>
    </div>
</body>
</html>
